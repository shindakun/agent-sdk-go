name: Upstream watch

# Watches anthropics/claude-agent-sdk-python and files triage issues here:
# CLI-version bumps roll into one issue; SDK-source commits get a Claude-triaged
# issue with a port recommendation. Requires an ANTHROPIC_API_KEY repo secret.
on:
  schedule:
    - cron: "0 13 * * *" # daily ~13:00 UTC
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Print actions instead of creating issues / advancing state"
        type: boolean
        default: false

permissions:
  contents: read
  issues: write

concurrency:
  group: upstream-watch
  cancel-in-progress: false

jobs:
  watch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run upstream watcher
        env:
          # GH_TOKEN authorizes gh for issues/variables in this repo.
          GH_TOKEN: ${{ github.token }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SELF_REPO: ${{ github.repository }}
          DRY_RUN: ${{ (github.event_name == 'workflow_dispatch' && inputs.dry_run) && '1' || '0' }}
        run: bash scripts/upstream-watch.sh
