name: E2E

# Manual only: the e2e tests and example runs make real (paid) API calls and
# require the ANTHROPIC_API_KEY secret. Trigger from the Actions tab.
on:
  workflow_dispatch:
    inputs:
      run_examples:
        description: "Also run every example via scripts/run-examples.sh"
        type: boolean
        default: true

jobs:
  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.x"
          check-latest: true

      - name: Install Claude Code
        run: |
          curl -fsSL https://claude.ai/install.sh | bash
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Verify Claude Code installation
        run: claude --version

      - name: Run e2e tests against the real binary
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: go test -tags e2e -timeout 1200s .

      - name: Run every example
        if: ${{ inputs.run_examples }}
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: bash scripts/run-examples.sh 120
