name: Lint

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.x"
          check-latest: true

      - name: gofmt
        run: |
          fmtout="$(gofmt -l .)"
          if [ -n "$fmtout" ]; then
            echo "These files are not gofmt-formatted:"
            echo "$fmtout"
            exit 1
          fi

      - name: go vet
        run: go vet ./...

      - name: go build (incl. examples)
        run: go build ./...

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.1.6
          # The repo .golangci.yml (version "2") sets build-tags so the
          # integration/e2e files are linted too.
